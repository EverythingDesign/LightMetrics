<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0FP — The Aspiration of Zero False Positives</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;

    --purple-50: #EEEDFE;
    --purple-200: #AFA9EC;
    --purple-600: #534AB7;
    --purple-800: #3C3489;

    --teal-50: #E1F5EE;
    --teal-200: #5DCAA5;
    --teal-600: #0F6E56;
    --teal-800: #085041;

    --green-50: #EAF3DE;
    --green-200: #97C459;
    --green-600: #3B6D11;
    --green-800: #27500A;

    --amber-50: #FAEEDA;
    --amber-200: #EF9F27;
    --amber-600: #854F0B;
    --amber-800: #633806;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #262624;
      --bg3: #2e2e2b;
      --text: #e8e6de;
      --text2: #b0aea6;
      --text3: #888780;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);

      --purple-50: #26215C;
      --purple-200: #534AB7;
      --purple-600: #AFA9EC;
      --purple-800: #CECBF6;

      --teal-50: #04342C;
      --teal-200: #0F6E56;
      --teal-600: #5DCAA5;
      --teal-800: #9FE1CB;

      --green-50: #173404;
      --green-200: #3B6D11;
      --green-600: #97C459;
      --green-800: #C0DD97;

      --amber-50: #412402;
      --amber-200: #854F0B;
      --amber-600: #EF9F27;
      --amber-800: #FAC775;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page {
    max-width: 780px;
    margin: 0 auto;
  }

  .header {
    margin-bottom: 1.5rem;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .header p {
    font-size: 13px;
    color: var(--text2);
  }

  .diagram-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 12px;
  }

  .hint {
    font-size: 12px;
    color: var(--text3);
    text-align: center;
    margin-bottom: 12px;
  }

  svg { display: block; }

  .node-g { cursor: pointer; }
  .node-g:hover rect { opacity: 0.85; }
  .node-g:focus { outline: 2px solid var(--purple-600); outline-offset: 2px; border-radius: 8px; }

  .detail-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    min-height: 180px;
  }

  .detail-card.empty {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .detail-card.empty p {
    font-size: 13px;
    color: var(--text3);
  }

  .detail-header {
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg2);
  }

  .detail-header i {
    font-size: 18px;
    color: var(--text2);
  }

  .detail-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .bp { background: var(--purple-50); color: var(--purple-800); }
  .bt { background: var(--teal-50); color: var(--teal-800); }
  .bg { background: var(--green-50); color: var(--green-800); }
  .ba { background: var(--amber-50); color: var(--amber-800); }

  .detail-body {
    padding: 14px 16px;
  }

  .detail-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    margin-bottom: 12px;
  }

  .fact-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .fact {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }

  .fact i {
    font-size: 14px;
    margin-top: 1px;
    flex-shrink: 0;
    color: var(--text3);
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(3px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade { animation: fadein 0.18s ease; }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    border: 0.5px solid;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <h1>0FP — The aspiration of zero false positives</h1>
    <p>LightMetrics RideView · Full detection pipeline · Click any node to explore</p>
  </div>

  <div class="diagram-card">
    <p class="hint">Click any element to see details below</p>

    <svg width="100%" viewBox="0 0 680 520" role="img" aria-label="0FP workflow diagram showing edge detection, cloud re-verification, and coaching queue pipeline">

        <text x="119" y="79" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">Edge AI runs on-camera</text>

      <g class="node-g" id="n-detect" onclick="show('detect')" role="button" tabindex="0" aria-label="Edge AI detects events">
        <rect x="248" y="38" width="162" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
        <text x="329" y="57" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Edge AI detects</text>
        <text x="329" y="75" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">Distraction · fatigue · tailgating</text>
      </g>

      <!-- Arrow detects → alert -->
      <line x1="329" y1="94" x2="329" y2="128" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)" fill="none"/>

        <text x="329" y="148" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806">In-cabin alert fires</text>
        <text x="329" y="164" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">Driver corrects in real time</text>

      <!-- Arrow detects → clip saved (right branch) -->
      <line x1="410" y1="66" x2="488" y2="66" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)" fill="none"/>

      <!-- CLIP + METADATA SAVED -->
      <g class="node-g" id="n-clip" onclick="show('clip')" role="button" tabindex="0" aria-label="Clip and metadata saved">
        <rect x="490" y="38" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
        <text x="570" y="57" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Clip + metadata saved</text>
        <text x="570" y="75" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">NNVC compressed to SD card</text>
      </g>

      <!-- Arrow clip → upload -->
      <line x1="570" y1="94" x2="570" y2="168" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)" fill="none"/>

      <!-- SECTION DIVIDER -->
      <line x1="22" y1="205" x2="658" y2="205" stroke="#e0e0dc" stroke-width="0.5" stroke-dasharray="4 3" fill="none"/>
      <text x="340" y="217" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">Cloud processing</text>

      <!-- UPLOAD WHEN CONNECTED -->
      <g class="node-g" id="n-upload" onclick="show('upload')" role="button" tabindex="0" aria-label="Upload when connected">
        <rect x="470" y="228" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
        <text x="560" y="246" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">Upload when connected</text>
        <text x="560" y="262" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0F6E56">LTE · near real-time</text>
      </g>

      <!-- Arrow upload → VLM -->
      <line x1="470" y1="250" x2="422" y2="250" stroke="#0F6E56" stroke-width="1" marker-end="url(#arr)" fill="none"/>

      <!-- VLM RE-VERIFICATION -->
      <g class="node-g" id="n-vlm" onclick="show('vlm')" role="button" tabindex="0" aria-label="VLM re-verification">
        <rect x="240" y="228" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
        <text x="330" y="246" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">VLM re-verification</text>
        <text x="330" y="262" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0F6E56">Cross-references context + history</text>
      </g>

      <!-- Arrow VLM → FP filter -->
      <line x1="240" y1="250" x2="190" y2="250" stroke="#0F6E56" stroke-width="1" marker-end="url(#arr)" fill="none"/>

      <!-- FALSE POSITIVE FILTER -->
      <g class="node-g" id="n-fp" onclick="show('fp')" role="button" tabindex="0" aria-label="False positive filter">
        <rect x="30" y="228" width="158" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
        <text x="109" y="246" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">False positive filter</text>
        <text x="109" y="262" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0F6E56">Discard low-confidence flags</text>
      </g>

      <!-- Arrow FP → severity -->
      <line x1="109" y1="272" x2="109" y2="316" stroke="#0F6E56" stroke-width="1" marker-end="url(#arr)" fill="none"/>

      <!-- SEVERITY SCORING -->
      <g class="node-g" id="n-score" onclick="show('score')" role="button" tabindex="0" aria-label="Severity scoring">
        <rect x="30" y="318" width="158" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
        <text x="109" y="336" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">Severity scoring</text>
        <text x="109" y="352" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0F6E56">Ranked by risk level</text>
      </g>

      <!-- Arrow severity → queue -->
      <line x1="109" y1="362" x2="109" y2="406" stroke="#3B6D11" stroke-width="1" marker-end="url(#arr)" fill="none"/>

      <!-- COACHING QUEUE -->
      <g class="node-g" id="n-queue" onclick="show('queue')" role="button" tabindex="0" aria-label="Coaching queue">
        <rect x="30" y="408" width="158" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
        <text x="109" y="428" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Coaching queue</text>
        <text x="109" y="448" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">90–95% fewer events</text>
      </g>

      <!-- Arrow queue → manager -->
      <line x1="188" y1="436" x2="248" y2="436" stroke="#3B6D11" stroke-width="1" marker-end="url(#arr)" fill="none"/>

      <!-- SAFETY MANAGER -->
      <g class="node-g" id="n-coach" onclick="show('coach')" role="button" tabindex="0" aria-label="Safety manager reviews">
        <rect x="250" y="408" width="178" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
        <text x="339" y="428" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Safety manager reviews</text>
        <text x="339" y="448" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">6–10 verified events per day</text>
      </g>

      <!-- Arrow manager → evidence -->
      <line x1="428" y1="436" x2="470" y2="436" stroke="#3B6D11" stroke-width="1" marker-end="url(#arr)" fill="none"/>

      <!-- EVIDENCE STORE -->
      <g class="node-g" id="n-evidence" onclick="show('evidence')" role="button" tabindex="0" aria-label="Evidence store">
        <rect x="472" y="408" width="178" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
        <text x="561" y="428" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Evidence store</text>
        <text x="561" y="448" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">Exoneration-ready footage</text>
      </g>

      <!-- PRECISION CALLOUT BOX -->
      <rect x="240" y="316" width="420" height="68" rx="8" fill="none" stroke="#d0d0cc" stroke-width="0.5" stroke-dasharray="3 3"/>
      <text x="252" y="334" dominant-baseline="central" font-size="11" fill="#888780">Precision improvement with 0FP</text>
      <text x="252" y="354" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489">Distracted driving</text>
      <text x="252" y="372" dominant-baseline="central" font-size="11" fill="#534AB7">86% → 94%</text>
      <text x="390" y="354" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489">Drowsy driving</text>
      <text x="390" y="372" dominant-baseline="central" font-size="11" fill="#534AB7">75% → 90%</text>
      <text x="516" y="354" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489">Tailgating</text>
      <text x="516" y="372" dominant-baseline="central" font-size="11" fill="#534AB7">91% → 99%</text>

      <!-- LEGEND -->
      <rect x="30" y="488" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
      <text x="46" y="493" dominant-baseline="central" font-size="11" fill="#888780">Edge layer</text>
      <rect x="120" y="488" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
      <text x="136" y="493" dominant-baseline="central" font-size="11" fill="#888780">Cloud layer</text>
      <rect x="210" y="488" width="10" height="10" rx="2" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
      <text x="226" y="493" dominant-baseline="central" font-size="11" fill="#888780">Output layer</text>
      <rect x="300" y="488" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
      <text x="316" y="493" dominant-baseline="central" font-size="11" fill="#888780">Real-time action</text>
    </svg>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-card empty" id="detail-panel">
    <p>Click any node in the diagram above</p>
  </div>

</div>

<script>
const nodes = {
  edge:{icon:'ti-cpu',title:'In-vehicle edge device',badges:[{t:'Edge layer',c:'bp'}],desc:'The entire detection pipeline starts here — on the camera itself. No cloud round-trip required. The camera runs dual AI simultaneously: a driver-facing DMS (Driver Monitoring System) and a road-facing ADAS (Advanced Driver Assistance System). All compute happens on the camera\'s own processor.',facts:[{i:'ti-bolt',t:'Real-time detection with no latency — alerts fire in milliseconds, before any footage leaves the device.'},{i:'ti-brain',t:'Bayesian neural networks measure their own confidence. If the model is uncertain, it stays quiet rather than firing a false flag.'},{i:'ti-eye',t:'Precision is prioritised over recall by design — fewer alerts, but every one that fires is real.'},{i:'ti-device-floppy',t:'Flagged events are compressed using NNVC and saved to SD card — 135 hours on a standard 128GB card vs 55 hours with conventional encoding.'}]},
  detect:{icon:'ti-scan',title:'Edge AI detects',badges:[{t:'DMS + ADAS',c:'bp'},{t:'Bayesian AI',c:'bp'}],desc:'The edge AI detects a comprehensive set of driver and road events simultaneously. Two taxonomies run in parallel: visual inattention (head pose and gaze direction) and manual task inattention (phone use, smoking, drinking). Road events are detected via the forward-facing camera.',facts:[{i:'ti-eye',t:'Driver inattention: looking down (pitch), rubbernecking (yaw), gaze-down short/long — competitors miss gaze-down, which is ~30% of all distraction events.'},{i:'ti-car',t:'Road events: Posted Speed Limits (99% precision), Stop Signs (99/97), FCW (99/97), Tailgating (99/96), Lane Drift, Traffic Lights.'},{i:'ti-shield',t:'Driver-facing: Distraction Gaze (98/92), Cellphone Calling (99/93), Cellphone Texting (93/91), Drowsy including early alert (97/93), Seatbelt (99/92).'},{i:'ti-clock',t:'All processing happens on-device in real time — the alert fires before the clip is even saved to the SD card.'}]},
  alert:{icon:'ti-bell',title:'In-cabin alert fires',badges:[{t:'Real-time',c:'ba'},{t:'Driver-facing',c:'ba'}],desc:'When the edge AI fires with sufficient confidence, an immediate in-cabin alert triggers — a beep, voice cue, or visual indicator. The driver self-corrects in the moment. This is the prevention layer. Everything downstream is about evidence and coaching — this is where actual crashes are stopped.',facts:[{i:'ti-volume',t:'Alert happens on-device before any cloud involvement — no latency from connectivity.'},{i:'ti-user',t:'Alerts are calibrated to minimise driver fatigue. False alerts erode trust and lead to tampering — so precision over recall is the operating principle.'},{i:'ti-shield-check',t:'Driver self-correction in the moment is the primary safety outcome. The coaching queue and exoneration footage are secondary benefits.'},{i:'ti-mood-happy',t:'Drivers who trust the system don\'t tamper with cameras or ignore alerts. Driver buy-in is a direct product of low false positive rates.'}]},
  clip:{icon:'ti-device-floppy',title:'Clip + metadata saved',badges:[{t:'NNVC compressed',c:'bp'},{t:'On-device',c:'bp'}],desc:'Every flagged event is saved as a short clip plus structured metadata — event type, timestamp, GPS location, driver ID, confidence score, and environmental context. NNVC compression reduces file size by 50%+ compared to standard H.264, enabling dramatically longer local retention.',facts:[{i:'ti-database',t:'135 hours stored on a standard 128GB SD card vs 55 hours with conventional encoding — weeks of footage vs hours.'},{i:'ti-wifi',t:'Continuous footage is saved locally on a rolling basis. Flagged event clips are prioritised for upload when LTE connectivity is available.'},{i:'ti-lock',t:'Encryption on-device is a built-in capability — not a toggle. Data governance and privacy controls are architectural, not optional.'},{i:'ti-clock',t:'Camera stays on standby even when the vehicle is off — it can receive a retrieval push request and wake up to upload footage on demand.'}]},
  upload:{icon:'ti-cloud-upload',title:'Upload when connected',badges:[{t:'LTE',c:'bt'},{t:'Near real-time',c:'bt'}],desc:'Flagged event clips and metadata upload to the cloud when the vehicle has LTE connectivity. Near real-time for active events. NNVC compression means uploads are 50%+ smaller than raw H.264 — saving $1–2 per device per month in carrier costs, entirely retained by the TSP.',facts:[{i:'ti-signal',t:'Priority queue: flagged events upload first. Continuous footage stays on-device unless requested via on-demand retrieval.'},{i:'ti-refresh',t:'Stage-by-stage retrieval status updates — the safety manager can track exactly where their footage request is, like a delivery tracker.'},{i:'ti-battery',t:'Camera standby mode means footage can be requested even when ignition is off — weeks-old clips can be retrieved if a claim arrives late.'},{i:'ti-coin',t:'50% data cost reduction translates to $12,000–$24,000 annual carrier savings for a 1,000-vehicle fleet.'}]},
  vlm:{icon:'ti-brain',title:'Visual Language Model re-verification',badges:[{t:'Cloud AI',c:'bt'},{t:'No hardware upgrade needed',c:'bt'}],desc:'Every event flagged by the edge AI is independently re-verified by cloud-based Visual Language Models. The cloud has no compute or power constraints — it can do context-aware verification that the edge device cannot, including cross-referencing multiple data sources simultaneously.',facts:[{i:'ti-history',t:'VLMs cross-reference: driver history and patterns, GPS location, time of day, weather conditions, road type, and crowdsourced POI data.'},{i:'ti-chart-line',t:'Cloud re-verification reduces false positives by up to 15% across all event types — with no hardware change required.'},{i:'ti-users',t:'No human review bureau. No offshore review team manually watching clips. The second opinion is algorithmic, consistent, and scalable.'},{i:'ti-shield',t:'This is the 0FP layer — the aspiration of zero false positives. What passes cloud re-verification is what reaches a human.'}]},
  fp:{icon:'ti-filter',title:'False positive filter',badges:[{t:'0FP layer',c:'bt'},{t:'Up to 15% reduction',c:'bt'}],desc:'Events that don\'t pass cloud re-verification are discarded silently. No alert reaches the safety manager. No driver gets wrongly flagged. This is the architectural commitment to precision — the system withholds when not certain, rather than passing everything through for humans to sort.',facts:[{i:'ti-x',t:'Discarded events: low-confidence flags, events contradicted by contextual data, edge detections that don\'t survive VLM review.'},{i:'ti-chart-bar',t:'Precision improvement: distracted driving 86%→94%, drowsy driving 75%→90%, tailgating 91%→99%.'},{i:'ti-user-check',t:'Every false positive stopped here is a coaching session not wasted, a driver not wrongly accused, and trust not eroded.'},{i:'ti-trending-down',t:'Lower false positive rates directly correlate with driver system adoption and retention — fleets that trust the data use it better.'}]},
  score:{icon:'ti-list-numbers',title:'Severity scoring',badges:[{t:'Risk-ranked',c:'bt'},{t:'Coachable events only',c:'bt'}],desc:'Verified events are scored by severity before reaching the coaching queue. A drowsy driver at highway speed ranks above a brief phone glance. The scoring model considers event type, duration, recurrence pattern, and driver history to surface what actually needs coaching attention.',facts:[{i:'ti-arrow-up',t:'High priority: drowsiness, sustained distraction, forward collision warnings, repeated violations from the same driver.'},{i:'ti-arrow-down',t:'Lower priority: single brief events from clean-record drivers, non-safety critical flags, events with partial context.'},{i:'ti-history',t:'Driver history feeds into scoring — a first-time speed infraction is weighted differently from a pattern of recurring events.'},{i:'ti-clock',t:'The output is a manageable ranked list — not a data dump. Coaches spend time coaching, not triaging raw footage.'}]},
  queue:{icon:'ti-checks',title:'Coaching queue',badges:[{t:'90–95% fewer events',c:'bg'},{t:'Verified',c:'bg'}],desc:'The coaching queue is the culmination of the entire pipeline. What reaches here has been flagged by edge AI, re-verified by cloud VLMs, filtered for false positives, and ranked by severity. A safety manager opens their dashboard and sees 6–10 events — not 200.',facts:[{i:'ti-clock',t:'Safety management that used to take hours becomes a 15-minute daily workflow. Coaches spend time coaching, not watching footage.'},{i:'ti-shield-check',t:'Every event in the queue has been verified twice — edge and cloud. Coaches can open a session confident the flag is real.'},{i:'ti-trending-down',t:'90–95% reduction in events per driver per month vs raw edge AI output. This is the commercial value of the 0FP architecture.'},{i:'ti-user-check',t:'Coaching sessions grounded in verified evidence build driver trust and compliance — not resentment.'}]},
  coach:{icon:'ti-user',title:'Safety manager reviews',badges:[{t:'6–10 events/day',c:'bg'},{t:'Evidence-backed',c:'bg'}],desc:'The safety manager sees a ranked, verified list. Each event has the clip, the confidence scores, the contextual data, and the driver\'s history. The coaching workflow is built around the data — not around manual triage. Both self-service and in-person coaching flows are supported.',facts:[{i:'ti-movie',t:'Each event card has the clip, timestamp, GPS location, event type, confidence score, and prior occurrence count for that driver.'},{i:'ti-messages',t:'Self-coaching: drivers can review their own events and acknowledge. In-person: manager-led session with clip review and documented outcome.'},{i:'ti-chart-bar',t:'Coaching effectiveness is trackable — event frequency per driver over time shows whether interventions are working.'},{i:'ti-mood-happy',t:'Coaching that opens with what the driver did right drives better outcomes than purely punitive approaches.'}]},
  evidence:{icon:'ti-shield-check',title:'Evidence store',badges:[{t:'Exoneration-ready',c:'bg'},{t:'Holds up in court',c:'bg'}],desc:'Every verified event is stored as legal-grade evidence. When a claim arrives — days, weeks, or months later — the footage exists, was captured reliably, has been verified twice, and is retrievable on demand. This is the moment the entire system was built for.',facts:[{i:'ti-gavel',t:'When law enforcement calls and lawyers get involved, the safety manager can request footage instantly — even from a parked vehicle via standby push.'},{i:'ti-shield',t:'The video doesn\'t just exist — it\'s reliable. Verified by edge AI and cloud VLMs. Not a raw, unverified clip that opposing counsel can question.'},{i:'ti-user-check',t:'Driver exoneration: when the accident wasn\'t the driver\'s fault, the footage proves it. This protects a driver\'s record and livelihood.'},{i:'ti-clock',t:'Weeks of footage retained vs hours — claims rarely arrive the next morning. The storage architecture was designed for the reality of how litigation moves.'}]}
};

function show(id) {
  const d = nodes[id];
  const panel = document.getElementById('detail-panel');
  panel.classList.remove('empty');
  panel.innerHTML = `
    <div class="detail-header fade">
      <i class="ti ${d.icon}"></i>
      <span class="detail-title">${d.title}</span>
      <div class="badges">${d.badges.map(b => `<span class="badge ${b.c}">${b.t}</span>`).join('')}</div>
    </div>
    <div class="detail-body fade">
      <p class="detail-desc">${d.desc}</p>
      <div class="fact-list">
        ${d.facts.map(f => `<div class="fact"><i class="ti ${f.i}"></i><span>${f.t}</span></div>`).join('')}
      </div>
    </div>
  `;
}

document.querySelectorAll('.node-g').forEach(n => {
  n.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      show(n.id.replace('n-', ''));
    }
  });
});
</script>
